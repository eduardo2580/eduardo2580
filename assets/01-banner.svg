<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <radialGradient id="bg" cx="50%" cy="55%" r="70%">
      <stop offset="0%" stop-color="#100820"/>
      <stop offset="100%" stop-color="#06040e"/>
    </radialGradient>
    <radialGradient id="orb-l" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7F3FBF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7F3FBF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb-r" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#A9FEF7" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#A9FEF7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#A9FEF7"/>
      <stop offset="50%"  stop-color="#E0D4FF"/>
      <stop offset="100%" stop-color="#A9FEF7"/>
    </linearGradient>
    <linearGradient id="sepGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#7F3FBF" stop-opacity="0"/>
      <stop offset="40%"  stop-color="#A9FEF7" stop-opacity="0.7"/>
      <stop offset="60%"  stop-color="#A9FEF7" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#7F3FBF" stop-opacity="0"/>
    </linearGradient>
    <filter id="g6" x="-30%" y="-60%" width="160%" height="220%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="g3" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="300" fill="url(#bg)"/>

  <!-- perspective grid -->
  <g stroke="#A9FEF7" stroke-width="0.5" opacity="0.14">
    <line x1="400" y1="250" x2="0"   y2="380"/>
    <line x1="400" y1="250" x2="100" y2="380"/>
    <line x1="400" y1="250" x2="200" y2="380"/>
    <line x1="400" y1="250" x2="300" y2="380"/>
    <line x1="400" y1="250" x2="400" y2="380"/>
    <line x1="400" y1="250" x2="500" y2="380"/>
    <line x1="400" y1="250" x2="600" y2="380"/>
    <line x1="400" y1="250" x2="700" y2="380"/>
    <line x1="400" y1="250" x2="800" y2="380"/>
  </g>
  <g stroke="#A9FEF7" stroke-width="0.4" opacity="0.10">
    <line x1="160" y1="310" x2="640" y2="310"/>
    <line x1="220" y1="285" x2="580" y2="285"/>
    <line x1="300" y1="267" x2="500" y2="267"/>
  </g>
  <line x1="0" y1="250" x2="800" y2="250" stroke="#A9FEF7" stroke-width="0.4" opacity="0.22"/>

  <!-- atmospheric glows -->
  <ellipse cx="140" cy="170" rx="150" ry="100" fill="url(#orb-l)"/>
  <ellipse cx="660" cy="178" rx="140" ry="90"  fill="url(#orb-r)"/>

  <!-- left ring system -->
  <g transform="translate(138,168)">
    <ellipse cx="0" cy="0" rx="66" ry="20" fill="none" stroke="#7F3FBF" stroke-width="1.2" opacity="0.6" filter="url(#g3)">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="14s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="0" cy="0" rx="48" ry="14" fill="none" stroke="#A9FEF7" stroke-width="0.8" opacity="0.4" transform="rotate(50)">
      <animateTransform attributeName="transform" type="rotate" from="50" to="410" dur="9s" repeatCount="indefinite"/>
    </ellipse>
    <circle cx="0" cy="0" r="6" fill="#C9B8FF" opacity="0.9" filter="url(#g3)"/>
    <circle cx="0" cy="0" r="3" fill="#fff" opacity="0.9"/>
    <circle cx="66" cy="0" r="3.5" fill="#A9FEF7" filter="url(#g3)">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" cx="0" cy="0" dur="14s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- right ring system -->
  <g transform="translate(662,178)">
    <ellipse cx="0" cy="0" rx="58" ry="17" fill="none" stroke="#A9FEF7" stroke-width="1.2" opacity="0.5" filter="url(#g3)">
      <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="11s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="0" cy="0" rx="40" ry="12" fill="none" stroke="#7F3FBF" stroke-width="0.8" opacity="0.4" transform="rotate(-38)">
      <animateTransform attributeName="transform" type="rotate" from="-38" to="-398" dur="7s" repeatCount="indefinite"/>
    </ellipse>
    <circle cx="0" cy="0" r="5" fill="#A9FEF7" opacity="0.85" filter="url(#g3)"/>
    <circle cx="0" cy="0" r="2.5" fill="#fff" opacity="0.8"/>
    <circle cx="-58" cy="0" r="3" fill="#C9B8FF" filter="url(#g3)">
      <animateTransform attributeName="transform" type="rotate" from="0" to="-360" cx="0" cy="0" dur="11s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- stars -->
  <g fill="#A9FEF7">
    <circle cx="55"  cy="22" r="1">  <animate attributeName="opacity" values="0.2;0.9;0.2" dur="3.2s" repeatCount="indefinite"/></circle>
    <circle cx="210" cy="14" r="0.9"><animate attributeName="opacity" values="0.1;0.7;0.1" dur="4.5s" repeatCount="indefinite"/></circle>
    <circle cx="480" cy="18" r="0.8"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="3.9s" repeatCount="indefinite"/></circle>
    <circle cx="750" cy="20" r="0.9"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="2.4s" repeatCount="indefinite"/></circle>
    <circle cx="340" cy="30" r="1.1"><animate attributeName="opacity" values="0.3;1;0.3"   dur="2.8s" repeatCount="indefinite"/></circle>
  </g>
  <g fill="#C9B8FF">
    <circle cx="440" cy="25" r="1">  <animate attributeName="opacity" values="0.2;0.9;0.2" dur="3.0s" repeatCount="indefinite"/></circle>
    <circle cx="160" cy="40" r="0.8"><animate attributeName="opacity" values="0.1;0.6;0.1" dur="5.5s" repeatCount="indefinite"/></circle>
  </g>

  <!-- corner brackets -->
  <g stroke="#A9FEF7" stroke-width="1.5" fill="none" opacity="0.45">
    <polyline points="16,16 16,40 40,16"/>
    <polyline points="784,16 784,40 760,16"/>
  </g>
  <!-- side bars -->
  <rect x="16"  y="52" width="2" height="140" fill="#7F3FBF" opacity="0.4" rx="1"/>
  <rect x="782" y="52" width="2" height="140" fill="#7F3FBF" opacity="0.4" rx="1"/>

  <!-- NAME — hero text -->
  <text x="400" y="128"
    font-family="'Courier New',Courier,monospace"
    font-size="36" font-weight="700"
    fill="url(#nameGrad)"
    text-anchor="middle" letter-spacing="4"
    filter="url(#g6)">EDUARDO S. RODRIGUES</text>

  <!-- role — single clean word, 4 languages -->
  <text x="400" y="162"
    font-family="'Courier New',Courier,monospace"
    font-size="13" fill="#C9B8FF"
    text-anchor="middle" letter-spacing="5" opacity="0.9">DEVELOPER · DESARROLLADOR · DESENVOLVEDOR · 开发工程师</text>

  <!-- location -->
  <text x="400" y="187"
    font-family="'Courier New',Courier,monospace"
    font-size="11" fill="#A9FEF7"
    text-anchor="middle" letter-spacing="3" opacity="0.55">CAMPINAS, SP  ·  BRAZIL</text>

  <!-- separator -->
  <line x1="200" y1="204" x2="374" y2="204" stroke="url(#sepGrad)" stroke-width="0.8"/>
  <circle cx="400" cy="204" r="2.5" fill="#A9FEF7" opacity="0.9" filter="url(#g3)"/>
  <line x1="426" y1="204" x2="600" y2="204" stroke="url(#sepGrad)" stroke-width="0.8"/>

  <!-- lang indicator -->
  <text x="400" y="268"
    font-family="'Courier New',Courier,monospace"
    font-size="9" fill="#A9FEF7"
    text-anchor="middle" letter-spacing="6" opacity="0.25">EN · ES · PT · 中文</text>
</svg>
