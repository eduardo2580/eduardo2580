<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D0820"/><stop offset="100%" stop-color="#06040e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A9FEF7"/><stop offset="100%" stop-color="#7F3FBF"/>
    </linearGradient>
    <linearGradient id="footGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#7F3FBF" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#A9FEF7" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#7F3FBF" stop-opacity="0"/>
    </linearGradient>
    <filter id="g3" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="300" fill="url(#bg)"/>

  <!-- 3D card -->
  <rect x="22" y="22" width="756" height="256" rx="13" fill="#7F3FBF" opacity="0.11"/>
  <rect x="18" y="18" width="756" height="256" rx="13" fill="#1a0c30" opacity="0.5"/>
  <rect x="14" y="14" width="756" height="256" rx="11" fill="#110a22" stroke="#7F3FBF" stroke-width="0.8"/>
  <rect x="14" y="14" width="756" height="3"   rx="1"  fill="url(#accent)" opacity="0.85"/>
  <rect x="14" y="14" width="3"   height="256" rx="1"  fill="#A9FEF7" opacity="0.4"/>

  <!-- section label -->
  <text x="46" y="46"
    font-family="'Courier New',Courier,monospace"
    font-size="10" fill="#A9FEF7" letter-spacing="4" opacity="0.5">// CONNECT | CONECTAR | CONNECTER | 联系</text>

  <!-- tagline -->
  <text x="400" y="72"
    font-family="'Courier New',Courier,monospace"
    font-size="12" fill="#E0D4FF" text-anchor="middle" letter-spacing="1" opacity="0.85">let's build something | construyamos algo | vamos construir | 一起构建</text>

  <line x1="46" y1="84" x2="754" y2="84" stroke="#7F3FBF" stroke-width="0.5" opacity="0.28"/>

  <!-- contact rows — key x=60, dot x=158, value x=176, row height 30px -->
  <g font-family="'Courier New',Courier,monospace" font-size="13">

    <text x="60"  y="112" fill="#7F3FBF" opacity="0.7">email</text>
    <text x="158" y="112" fill="#A9FEF7" opacity="0.2">·</text>
    <text x="176" y="112" fill="#7FC5BF">edu.rodrigues2580@gmail.com</text>

    <text x="60"  y="142" fill="#7F3FBF" opacity="0.7">linkedin</text>
    <text x="158" y="142" fill="#A9FEF7" opacity="0.2">·</text>
    <text x="176" y="142" fill="#A9FEF7" opacity="0.6">linkedin.com/in/eduardo-souza-rodrigues</text>

    <text x="60"  y="172" fill="#7F3FBF" opacity="0.7">portfolio</text>
    <text x="158" y="172" fill="#A9FEF7" opacity="0.2">·</text>
    <text x="176" y="172" fill="#A9FEF7" opacity="0.6">eduardo2580.github.io</text>

    <text x="60"  y="202" fill="#7F3FBF" opacity="0.7">orcid</text>
    <text x="158" y="202" fill="#A9FEF7" opacity="0.2">·</text>
    <text x="176" y="202" fill="#C9B8FF" opacity="0.6">orcid.org/0009-0001-7877-2153</text>

    <text x="60"  y="232" fill="#7F3FBF" opacity="0.7">lattes</text>
    <text x="158" y="232" fill="#A9FEF7" opacity="0.2">·</text>
    <text x="176" y="232" fill="#C9B8FF" opacity="0.6">lattes.cnpq.br/2487835899987366</text>

  </g>

  <line x1="46" y1="250" x2="754" y2="250" stroke="url(#footGrad)" stroke-width="0.8"/>

  <!-- copyright -->
  <text x="400" y="268"
    font-family="'Courier New',Courier,monospace" font-size="10"
    fill="#7F3FBF" text-anchor="middle" opacity="0.4">© 2023–2026  Eduardo Souza Rodrigues · Campinas, SP</text>

  <!-- heartbeat -->
  <circle cx="400" cy="288" r="3" fill="#A9FEF7" opacity="0.55" filter="url(#g3)">
    <animate attributeName="r"       values="3;5;3"        dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.55;0.1;0.55" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
