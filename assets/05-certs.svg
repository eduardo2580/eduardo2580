<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" width="800" height="460">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D0820"/><stop offset="100%" stop-color="#06040e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A9FEF7"/><stop offset="100%" stop-color="#7F3FBF"/>
    </linearGradient>
    <linearGradient id="timelineGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#A9FEF7" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#7F3FBF" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <rect width="800" height="460" fill="url(#bg)"/>

  <!-- outer 3D card -->
  <rect x="22" y="22" width="760" height="416" rx="14" fill="#7F3FBF" opacity="0.13"/>
  <rect x="18" y="18" width="760" height="416" rx="14" fill="#1a0c30" opacity="0.5"/>
  <rect x="14" y="14" width="760" height="416" rx="12" fill="#110a22" stroke="#7F3FBF" stroke-width="0.8"/>
  <rect x="14" y="14" width="760" height="3"   rx="1"  fill="url(#accent)" opacity="0.8"/>
  <rect x="14" y="14" width="3"   height="416" rx="1"  fill="#A9FEF7"     opacity="0.4"/>

  <text x="46" y="52" font-family="'Courier New',Courier,monospace" font-size="11" fill="#A9FEF7" letter-spacing="4" opacity="0.55">// CERTIFICATIONS</text>

  <!-- timeline vertical line -->
  <line x1="80" y1="65" x2="80" y2="418" stroke="url(#timelineGrad)" stroke-width="1.5"/>

  <!-- CERT 1: University of Michigan -->
  <circle cx="80" cy="85" r="6" fill="#A9FEF7" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.4;0.9" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="80" cy="85" r="3" fill="#fff"/>
  <text x="104" y="80"  font-family="'Courier New',Courier,monospace" font-size="14" font-weight="700" fill="#A9FEF7">University of Michigan</text>
  <text x="104" y="98"  font-family="'Courier New',Courier,monospace" font-size="12" fill="#C9B8FF" opacity="0.75">Web Design for Everybody  ·  2023</text>
  <text x="104" y="114" font-family="'Courier New',Courier,monospace" font-size="11" fill="#7F3FBF" opacity="0.75">HTML5 · CSS3 · JavaScript · Responsive Design · Capstone</text>
  <rect x="104" y="120" width="76" height="16" rx="8" fill="#A9FEF7" opacity="0.12" stroke="#A9FEF7" stroke-width="0.5"/>
  <text x="142" y="132" font-family="'Courier New',Courier,monospace" font-size="10" fill="#A9FEF7" text-anchor="middle" letter-spacing="2">COMPLETED</text>

  <!-- CERT 2: ServiceNow -->
  <circle cx="80" cy="162" r="6" fill="#C9B8FF" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.4;0.9" dur="3s" begin="0.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="80" cy="162" r="3" fill="#fff"/>
  <text x="104" y="157" font-family="'Courier New',Courier,monospace" font-size="14" font-weight="700" fill="#C9B8FF">ServiceNow</text>
  <text x="104" y="175" font-family="'Courier New',Courier,monospace" font-size="12" fill="#A9FEF7" opacity="0.75">Bootcamps + Generative AI  ·  2023–2024</text>
  <text x="104" y="191" font-family="'Courier New',Courier,monospace" font-size="11" fill="#7F3FBF" opacity="0.75">Shark #4 · Shark #8 (15h) · Cask Camp (20h) · Now Learning AI</text>
  <rect x="104" y="197" width="76" height="16" rx="8" fill="#C9B8FF" opacity="0.12" stroke="#C9B8FF" stroke-width="0.5"/>
  <text x="142" y="209" font-family="'Courier New',Courier,monospace" font-size="10" fill="#C9B8FF" text-anchor="middle" letter-spacing="2">COMPLETED</text>

