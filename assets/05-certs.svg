  <circle cx="80" cy="318" r="6" fill="#C9B8FF" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.4;0.9" dur="3s" begin="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="80" cy="318" r="3" fill="#fff"/>
  <text x="104" y="313" font-family="'Courier New',Courier,monospace" font-size="14" font-weight="700" fill="#C9B8FF">Mobile &amp; Fundamentals</text>
  <text x="104" y="331" font-family="'Courier New',Courier,monospace" font-size="12" fill="#A9FEF7" opacity="0.75">Fundação Bradesco + SENAC  ·  2022–2026</text>
  <text x="104" y="347" font-family="'Courier New',Courier,monospace" font-size="11" fill="#7F3FBF" opacity="0.75">Android Studio (15h) · IT Fundamentals · OOP · SENAC (272h)</text>
  <rect x="104" y="353" width="76" height="16" rx="8" fill="#C9B8FF" opacity="0.12" stroke="#C9B8FF" stroke-width="0.5"/>
  <text x="142" y="365" font-family="'Courier New',Courier,monospace" font-size="10" fill="#C9B8FF" text-anchor="middle" letter-spacing="2">COMPLETED</text>

  <!-- CERT 5: In progress indicator -->
  <circle cx="80" cy="400" r="6" fill="#7F3FBF" opacity="0.7" stroke="#A9FEF7" stroke-width="1">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="80" cy="400" r="3" fill="#A9FEF7" opacity="0.5">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <text x="104" y="395" font-family="'Courier New',Courier,monospace" font-size="13" fill="#7F3FBF" opacity="0.8">ADS — Universidade São Francisco</text>
  <text x="104" y="413" font-family="'Courier New',Courier,monospace" font-size="11" fill="#A9FEF7" opacity="0.5">2024 – present  ·  in progress...</text>
  <rect x="104" y="419" width="82" height="16" rx="8" fill="#7F3FBF" opacity="0.2" stroke="#7F3FBF" stroke-width="0.5"/>
  <text x="145" y="431" font-family="'Courier New',Courier,monospace" font-size="10" fill="#C9B8FF" text-anchor="middle" letter-spacing="2">IN PROGRESS</text>

  <!-- exploration hook -->
  <line x1="46" y1="444" x2="754" y2="444" stroke="#7F3FBF" stroke-width="0.5" opacity="0.25"/>
  <text x="400" y="455" font-family="'Courier New',Courier,monospace" font-size="11"
    fill="#A9FEF7" text-anchor="middle" letter-spacing="2" opacity="0.4">reach out — let's connect  ↓</text>
</svg>
