  <text x="104" y="253" font-family="'Courier New',Courier,monospace" font-size="12" fill="#C9B8FF" opacity="0.75">Imersão Series  ·  2024–2026</text>
  <text x="104" y="269" font-family="'Courier New',Courier,monospace" font-size="11" fill="#7F3FBF" opacity="0.75">Gemini · Back-End · Python Data · AI Agents  (4h each)</text>
  <rect x="104" y="275" width="76" height="16" rx="8" fill="#A9FEF7" opacity="0.12" stroke="#A9FEF7" stroke-width="0.5"/>
  <text x="142" y="287" font-family="'Courier New',Courier,monospace" font-size="10" fill="#A9FEF7" text-anchor="middle" letter-spacing="2">COMPLETED</text>

