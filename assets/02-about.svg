<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 310" width="800" height="310">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D0820"/><stop offset="100%" stop-color="#06040e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A9FEF7"/><stop offset="100%" stop-color="#7F3FBF"/>
    </linearGradient>
  </defs>

  <rect width="800" height="310" fill="url(#bg)"/>

  <!-- 3D card: shadow → mid → surface -->
  <rect x="22" y="22" width="756" height="266" rx="13" fill="#7F3FBF" opacity="0.16"/>
  <rect x="18" y="18" width="756" height="266" rx="13" fill="#1a0c30" opacity="0.55"/>
  <rect x="14" y="14" width="756" height="266" rx="11" fill="#110a22" stroke="#7F3FBF" stroke-width="0.8"/>
  <!-- accent bars -->
  <rect x="14" y="14" width="756" height="3" rx="1" fill="url(#accent)" opacity="0.85"/>
  <rect x="14" y="14" width="3"   height="266" rx="1" fill="#A9FEF7" opacity="0.4"/>

  <!-- section label -->
  <text x="46" y="46"
    font-family="'Courier New',Courier,monospace"
    font-size="10" fill="#A9FEF7" letter-spacing="4" opacity="0.5">// ABOUT | SOBRE | À PROPOS | ACERCA | 关于</text>

  <!-- Column layout: keys at x=46, colons at x=200, values at x=218 -->
  <!-- Row height: 34px apart, starting at y=78 -->

  <!-- keys — stacked bilingual pairs, font-size 10 -->
  <g font-family="'Courier New',Courier,monospace" font-size="10" fill="#7F3FBF" opacity="0.75">
    <text x="46" y="72">name / nombre</text>
    <text x="46" y="84">nome / 姓名</text>

    <text x="46" y="106">born / nacido</text>
    <text x="46" y="118">nascido / 出生</text>

    <text x="46" y="140">role / rol</text>
    <text x="46" y="152">cargo / 职位</text>

    <text x="46" y="174">degree / carrera</text>
    <text x="46" y="186">curso / 学历</text>

    <text x="46" y="208">prev / anterior</text>
    <text x="46" y="220">anterior / 之前</text>

    <text x="46" y="242">building / creando</text>
    <text x="46" y="254">construindo / 构建中</text>
  </g>

  <!-- colon column -->
  <g font-family="'Courier New',Courier,monospace" font-size="14" fill="#A9FEF7" opacity="0.2">
    <text x="200" y="80">:</text>
    <text x="200" y="112">:</text>
    <text x="200" y="144">:</text>
    <text x="200" y="176">:</text>
    <text x="200" y="208">:</text>
    <text x="200" y="240">:</text>
  </g>

  <!-- values — font-size 13, vertically centered in each row -->
  <g font-family="'Courier New',Courier,monospace" font-size="13">
    <text x="218" y="80"  fill="#E0D4FF">"Eduardo Souza Rodrigues"</text>
    <text x="218" y="112" fill="#A9FEF7">"2005 · Campinas, SP"</text>
    <text x="218" y="144" fill="#A9FEF7">"Developer"</text>
    <text x="218" y="176" fill="#A9FEF7">"ADS — Universidade São Francisco"</text>
    <text x="218" y="208" fill="#C9B8FF">"Técnico em Informática — SENAC 🏆"</text>
    <text x="218" y="240" fill="#A9FEF7">"web apps · open-source · AI agents"</text>
  </g>

  <!-- blinking cursor at end of last value -->
  <rect x="536" y="226" width="8" height="15" rx="1" fill="#A9FEF7" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0;0.8" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <!-- divider -->
  <line x1="46" y1="268" x2="754" y2="268" stroke="#7F3FBF" stroke-width="0.5" opacity="0.3"/>
  <text x="400" y="288"
    font-family="'Courier New',Courier,monospace" font-size="10"
    fill="#A9FEF7" text-anchor="middle" letter-spacing="2" opacity="0.3">scroll · desplazar · rolar · 滚动  ↓</text>
</svg>
