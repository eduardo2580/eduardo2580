<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 330" width="800" height="330">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D0820"/><stop offset="100%" stop-color="#06040e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A9FEF7"/><stop offset="100%" stop-color="#7F3FBF"/>
    </linearGradient>
  </defs>

  <rect width="800" height="330" fill="url(#bg)"/>

  <!-- 3D card depth shadows -->
  <rect x="22" y="22" width="760" height="286" rx="14" fill="#7F3FBF" opacity="0.18"/>
  <rect x="18" y="18" width="760" height="286" rx="14" fill="#1a0c30" opacity="0.6"/>
  <rect x="14" y="14" width="760" height="286" rx="12" fill="#110a22" stroke="#7F3FBF" stroke-width="0.8"/>
  <rect x="14" y="14" width="760" height="3"   rx="1"  fill="url(#accent)" opacity="0.8"/>
  <rect x="14" y="14" width="3"   height="286" rx="1"  fill="#A9FEF7" opacity="0.4"/>

  <text x="46" y="52" font-family="'Courier New',Courier,monospace" font-size="11" fill="#A9FEF7" letter-spacing="4" opacity="0.55">// ABOUT</text>

  <!-- keys -->
  <g font-family="'Courier New',Courier,monospace" font-size="15" fill="#7F3FBF" opacity="0.9">
    <text x="46" y="84">name</text>
    <text x="46" y="112">born</text>
    <text x="46" y="140">role</text>
    <text x="46" y="168">degree</text>
    <text x="46" y="196">prev</text>
    <text x="46" y="224">building</text>
    <text x="46" y="252">contact</text>
  </g>

  <!-- colons -->
  <g font-family="'Courier New',Courier,monospace" font-size="15" fill="#A9FEF7" opacity="0.3">
    <text x="168" y="84">:</text>
    <text x="168" y="112">:</text>
    <text x="168" y="140">:</text>
    <text x="168" y="168">:</text>
    <text x="168" y="196">:</text>
    <text x="168" y="224">:</text>
    <text x="168" y="252">:</text>
  </g>

  <!-- values -->
  <g font-family="'Courier New',Courier,monospace" font-size="15">
    <text x="188" y="84"  fill="#E0D4FF">"Eduardo Souza Rodrigues"</text>
    <text x="188" y="112" fill="#A9FEF7">"2005 · Campinas, SP"</text>
    <text x="188" y="140" fill="#A9FEF7">"Junior Developer"</text>
    <text x="188" y="168" fill="#A9FEF7">"ADS — Universidade São Francisco"</text>
    <text x="188" y="196" fill="#C9B8FF">"Técnico em Informática — SENAC  🏆"</text>
    <text x="188" y="224" fill="#A9FEF7">"web apps · open-source · AI agents"</text>
    <text x="188" y="252" fill="#7FC5BF">"eduardo.kvsw3@aleeas.com"</text>
  </g>

  <!-- blinking cursor after email -->
  <rect x="530" y="238" width="9" height="16" rx="1" fill="#A9FEF7" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0;0.8" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <!-- subtle divider + exploration nudge -->
  <line x1="46" y1="272" x2="754" y2="272" stroke="#7F3FBF" stroke-width="0.5" opacity="0.3"/>
  <text x="400" y="293" font-family="'Courier New',Courier,monospace" font-size="11"
    fill="#A9FEF7" text-anchor="middle" letter-spacing="2" opacity="0.4">scroll down to see what i've been building  ↓</text>
</svg>
