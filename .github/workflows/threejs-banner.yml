name: 🎨 Render Three.js Banner

on:
  schedule:
    - cron: "0 3 * * *"   # runs every night at 03:00 UTC
  workflow_dispatch:        # manual trigger from Actions tab
  push:
    paths:
      - "scripts/render-banner.mjs"

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 📦 Install dependencies
        run: |
          npm install three@0.163.0 canvas@2.11.2 gl@6.0.2

      - name: 🖼️ Run Three.js renderer
        run: node scripts/render-banner.mjs

      - name: 🚀 Commit & push generated assets
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: regenerate 3D banner [skip ci]"
          file_pattern: "assets/banner.svg assets/banner-dark.svg"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
